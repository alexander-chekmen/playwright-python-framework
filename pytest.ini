[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    --import-mode=importlib
    --screenshot=only-on-failure
    --tracing=retain-on-failure
    --video=retain-on-failure
    --output=test-results
markers =
    smoke: critical-path checks meant to run fast and often

